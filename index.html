<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Account Ledger Mobile</title>
<style>
:root {
  --bg:#ffffff;--surf:#f5f5f5;--surf2:#ebebeb;--surf3:#e0e2e4;
  --txt:#030314;--muted:#706d82;--faint:#b0aee2;
  --bdr:rgba(40,35,25,1);--divrgba(40,35,25,.06);
  --pri:#9160f6;--pri-bg:#5a2f31;--pri-dark:#0f3688;
  --dr:#4437a22;--dr-bg:#0af2e4;
  --cr:#064315;--cr-bg:#f3fec5;
  --open-bg:#8f8f7;--close-bg:#f4f940;
  --vh:0 2px 8px rgba(30,25,10,.07),0 0px 2px rgba(30,25,10,.04);
  --xh:lg:0 4px 10px rgba(70,35,10,.09),0 10px 40px rgba(30,25,10,.07);
  --lop-bg:#fff;
}
:root[data-theme="light"]{
  --bg:#f5f4f0;--surf:#fff;--surf2:#f0eded;--surf3:#e0e2e4;
  --txt:#23130a;--muted:#706b82;--faint:#b0aee2;
  --bdr:rgba(255,250,240,.06);--divrgba(255,250,240,.06);
  --pri:#5ab70c;--pri-bg:#5a2f31;--pri-dark:#076d69;
  --dr:#8c0a6c;--dr-bg:#21c618;
  --cr:#00c4bc;--cr-bg:#22c822;
  --open-bg:#1a2e2f;--close-bg:#01e0b58;
  --sh:0 2px 8px rgba(0,0,.25),0 8px 24px rgba(0,0,0,.7);
  --sh-lg:0 4px 15px rgba(0,0,.21),0 10px 40px rgba(0,0,.25);
  --lop-bg:#202220;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:none;text-size-adjust:none;scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:var(--text-base);background:var(--bg);color:var(--txt);min-height:100dvh;line-height:1.5;padding-bottom:calc(env(safe-area-insert-bottom) + 34px);}
button,input,select{font:inherit;color:inherit;}
.topbar{
  position:sticky;top:0;z-index:30;
  background:color-mix(in srgb,var(--bg) 80%,transparent);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bdr);
  padding:calc(env(safe-area-inset-top) + .7rem) var(--sp4) .7rem;
}
.brand-row{display:flex;align-items:center;justify-content:space-between;gap:var(--sp3);}
.brand-title{font-size:var(--text-lg);font-weight:700;letter-spacing:-.01em;}
.brand-sub{font-size:var(--text-xs);color:var(--muted);margin-top:.1rem;}
.icon-btn{width:40px;height:40px;border-radius:999px;border:1px solid var(--bdr);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:1.05rem;cursor:pointer;transition:background .18s;}
.icon-btn:hover{background:var(--surf2);}
.wrap{max-width:900px;margin:0 auto;padding:var(--sp2);}
.status-bar{width:100%;border-radius:var(--r-lg);padding:var(--sp4) var(--sp4);margin-bottom:var(--sp4);display:flex;align-items:center;gap:.5rem;font-size:var(--text-sm);color:var(--muted);box-shadow:var(--sh);}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--cr);flex-shrink:0;}
.sdot.loading{background:var(--muted);animation:pulse 1.2s ease-in-out infinite;opacity:.35;}
.wrap{overflow:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:440px;}
th{font-size:var(--text-xs);font-weight:400;text-align:left;padding:.5rem .75rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;background:var(--surf);white-space:nowrap;}
td{text-align:right;font-variant-numeric:tabular-nums;}
td:first-child{text-align:left;font-size:var(--text-xs);padding:.55rem .75rem;margin:0;white-space:nowrap;}
.rd{font-size:var(--text-lg);font-weight:700;color:var(--dr);}
.rc{font-size:var(--text-lg);font-weight:700;color:var(--cr);}
.lop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.lop.open{opacity:1;pointer-events:all;}
.lop-box{background:var(--lop-bg);width:100%;max-width:580px;border-radius:18px 18px 0 0;padding:0;box-shadow:var(--sh-lg);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92dvh;overflow-y:auto;}
.lop.open .lop-box{transform:translateY(0);}
.lop-handle{width:36px;height:4px;border-radius:2px;background:var(--surf3);margin:10px auto 0;}
.lop-head{padding:1rem 1.25rem .6rem;display:flex;align-items:center;justify-content:space-between;}
.lop-title{font-weight:600;font-size:var(--text-base);}
.lop-body{padding:.25rem 1.25rem 1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);margin-bottom:.35rem;letter-spacing:.03em;}
.field input,.field select,.field datalist{width:100%;padding:.75rem 1rem;border-radius:10px;border:1px solid var(--bdr);background:var(--surf2);font-size:1rem;transition:border .15s;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus{outline:none;border-color:var(--pri);background:var(--surf);}
.date-row{display:flex;gap:.5rem;align-items:flex-end;}
.date-row .field{flex:1;margin-bottom:0;}
.today-btn{padding:.75rem 1rem;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;font-size:.85rem;white-space:nowrap;cursor:pointer;font-weight:500;transition:background .15s;}
.today-btn:hover{background:var(--surf3);}
.amt-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.pill{background:var(--pri-bg);border-radius:999px;padding:.25rem .75rem;font-size:var(--text-xs);font-weight:500;white-space:nowrap;flex-shrink:0;}
.bul{background:var(--cr-bg);color:var(--cr);border-radius:999px;padding:.15rem .65rem 0;font-size:var(--text-sm);font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums;}
.tv{overflow:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:440px;}
th{font-size:.75rem;font-weight:400;text-align:left;padding:.5rem .75rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;background:var(--surf);white-space:nowrap;}
td{text-align:right;font-variant-numeric:tabular-nums;}
td:first-child{text-align:left;font-size:.75rem;padding:.55rem .75rem;margin:0;white-space:nowrap;}
.rdr{color:var(--dr);font-weight:700;font-size:1rem;}
.rcr{color:var(--cr);font-weight:700;font-size:1rem;}
.rtot{font-weight:700;font-size:.95rem;}
.closing-row td{border-top:2px solid var(--bdr);font-size:.75rem;color:var(--muted);}
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 1.2rem);right:1.2rem;width:56px;height:56px;border-radius:50%;background:var(--pri);color:#fff;border:none;font-size:1.6rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:50;transition:transform .12s;}
.fab:active{transform:scale(.92);}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand-row">
    <div>
      <div class="brand-title">Account Balance</div>
      <div class="brand-sub" id="sheetLabel">Loading...</div>
    </div>
    <div style="display:flex;gap:.5rem;">
      <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">&#9680;</button>
    </div>
  </div>
</div>

<div class="wrap" style="margin-bottom:5rem;">
  <div class="status-bar">
    <span class="sdot" id="sdot"></span>
    <span id="balanceTxt">Balance: --</span>
  </div>
  <div class="tv">
    <table id="ledgerTable">
      <thead><tr>
        <th>日期</th><th>摘要</th><th>Dr.</th><th>Cr.</th><th>總額</th>
      </tr></thead>
      <tbody id="ledgerBody"></tbody>
    </table>
  </div>
</div>

<!-- Tab Switcher -->
<div style="position:fixed;bottom:calc(env(safe-area-inset-bottom)+4.5rem);left:0;right:0;display:flex;justify-content:center;z-index:40;">
  <div style="display:flex;gap:.4rem;overflow-x:auto;padding:.25rem .75rem;background:var(--surf);border-radius:999px;box-shadow:var(--sh);max-width:96vw;">
    <select id="sheetSelect" style="border:none;background:transparent;font-weight:600;padding:.2rem .5rem;cursor:pointer;" onchange="switchSheet(this.value)"></select>
    <button onclick="openForm()" style="background:var(--pri);color:#fff;border:none;border-radius:999px;padding:.2rem .9rem;font-weight:600;cursor:pointer;">+ Add</button>
  </div>
</div>

<button class="fab" onclick="openForm()">+</button>

<!-- Entry Form Popup -->
<div class="lop" id="lop" onclick="handleLopClick(event)">
  <div class="lop-box">
    <div class="lop-handle"></div>
    <div class="lop-head">
      <span class="lop-title">記帳</span>
      <button class="icon-btn" onclick="closeForm()" style="font-size:1.2rem;">&#10005;</button>
    </div>
    <div class="lop-body">
      <!-- Date with Today button -->
      <div class="field">
        <label>日期</label>
        <div class="date-row">
          <div class="field">
            <input type="date" id="fDate" required/>
          </div>
          <button type="button" class="today-btn" onclick="setToday()">Today</button>
        </div>
      </div>
      <!-- Item description with datalist -->
      <div class="field">
        <label>摘要（項目）</label>
        <input type="text" id="fDesc" list="descList" autocomplete="off" placeholder="Enter or choose item"/>
        <datalist id="descList"></datalist>
      </div>
      <!-- Dr / Cr amounts -->
      <div class="amt-row">
        <div class="field">
          <label>Dr. （支出）</label>
          <input type="number" id="fDr" step="0.01" min="0" placeholder="0.00"/>
        </div>
        <div class="field">
          <label>Cr. （收入）</label>
          <input type="number" id="fCr" step="0.01" min="0" placeholder="0.00"/>
        </div>
      </div>
      <!-- Note -->
      <div class="field">
        <label>備註（可略）</label>
        <input type="text" id="fNote" placeholder="Optional note"/>
      </div>
      <div id="formMsg" style="font-size:.85rem;color:var(--dr);margin-bottom:.5rem;"></div>
      <button onclick="submitEntry()" style="width:100%;padding:.9rem;background:var(--pri);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;">Save Entry</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzRwSc3xw6xiU19wSPQI7bBUtAPsHQTUoY0lZOv3C8FTJzxYJqpm2Zq5TFINsRDLFaUUQ/exec';const SS_ID = '1HovvPH1PjSXMGoJYDveAhj-X-zigGp1cjdKFw2soA4g';

let allSheets = [];
let currentSheet = '';
let descriptions = [];

// ── Init ──
async function init() {
  applyTheme();
  await loadSheets();
  setToday();
  loadDescriptions();
}

// ── Theme ──
function applyTheme() {
  const t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// ── Set Today's date ──
function setToday() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('fDate').value = `${y}-${m}-${d}`;
}

// ── Sheet name from date ──
function sheetNameFromDate(dateStr) {
  if (!dateStr) return '';
  const [y, m] = dateStr.split('-');
  const month = parseInt(m);
  const year = parseInt(y);
  // Use format like existing tabs: e.g. "4月 2026"
  return `${month}月 ${year}`;
}

// ── Load Sheets ──
async function loadSheets() {
  try {
        const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),15000);const res = await fetch(`${API}?action=read`, {redirect:'follow',signal:ctrl.signal});
    const data = await res.json();
        allSheets = Object.keys(data).filter(k => k && !k.startsWith('testing'));
    // Sort chronologically
    allSheets.sort((a,b) => {
      const [ma,ya] = a.split(/[月\s]+/);
      const [mb,yb] = b.split(/[月\s]+/);
      return (parseInt(ya||0)*12+parseInt(ma)) - (parseInt(yb||0)*12+parseInt(mb));
    });
    // Populate sheet selector
    const sel = document.getElementById('sheetSelect');
    sel.innerHTML = '';
    allSheets.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
    // Show latest sheet by default
    if (allSheets.length > 0) {
      currentSheet = allSheets[allSheets.length - 1];
      sel.value = currentSheet;
      renderSheet(data[currentSheet], currentSheet);
        }
  } catch(e) {
    document.getElementById('balanceTxt').textContent = 'Error: '+e.message;
  }
}

// ── Switch Sheet ──
async function switchSheet(name) {
  currentSheet = name;
  document.getElementById('sheetLabel').textContent = name;
  try {
        const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),15000);const res = await fetch(`${API}?action=read`, {redirect:'follow',signal:ctrl.signal});
    const data = await res.json();
    renderSheet(data[name], name);
  } catch(e) {}
}

// ── Render Sheet ──
function renderSheet(rows, name) {
  document.getElementById('sheetLabel').textContent = name || '';
  const tbody = document.getElementById('ledgerBody');
  tbody.innerHTML = '';
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted);">No entries yet</td></tr>';
    return;
  }
  let lastBalance = 0;
  rows.forEach((row, i) => {
    if (i === 0) return; // skip header
    const [date, time, desc, dr, cr, total] = row;
    const tr = document.createElement('tr');
    const drVal = parseFloat(dr) || 0;
    const crVal = parseFloat(cr) || 0;
    const totVal = parseFloat(String(total).replace(/[^\d.-]/g,'')) || 0;
    lastBalance = totVal;
    const isClosing = String(desc).includes('尾數');
    if (isClosing) tr.className = 'closing-row';
    tr.innerHTML = `
      <td>${date||''}<br/><span style="color:var(--muted);font-size:.7rem;">${desc||''}</span></td>
      <td>${drVal > 0 ? '<span class="rdr">-'+drVal.toLocaleString('zh-HK',{minimumFractionDigits:2,maximumFractionDigits:2})+'</span>' : ''}</td>
      <td>${crVal > 0 ? '<span class="rcr">+'+crVal.toLocaleString('zh-HK',{minimumFractionDigits:2,maximumFractionDigits:2})+'</span>' : ''}</td>
      <td class="rtot" style="padding:.55rem .75rem;">$${totVal.toLocaleString('zh-HK',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
    `;
    tbody.appendChild(tr);
  });
  // Update balance display
  const balEl = document.getElementById('balanceTxt');
  balEl.textContent = `結餘: $${lastBalance.toLocaleString('zh-HK',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  document.getElementById('sdot').classList.remove('loading');
}

// ── Load Descriptions ──
async function loadDescriptions() {
  try {
    const res = await fetch(`${API}?action=getDescriptions`, {redirect:'follow'});
    const data = await res.json();
    descriptions = data.descriptions || [];
    const dl = document.getElementById('descList');
    dl.innerHTML = '';
    descriptions.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      dl.appendChild(opt);
    });
  } catch(e) {}
}

// ── Form ──
function openForm() {
  setToday();
  document.getElementById('fDesc').value = '';
  document.getElementById('fDr').value = '';
  document.getElementById('fCr').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('formMsg').textContent = '';
  document.getElementById('lop').classList.add('open');
}
function closeForm() {
  document.getElementById('lop').classList.remove('open');
}
function handleLopClick(e) {
  if (e.target === document.getElementById('lop')) closeForm();
}

// ── Submit Entry ──
async function submitEntry() {
  const dateVal = document.getElementById('fDate').value;
  const desc = document.getElementById('fDesc').value.trim();
  const dr = parseFloat(document.getElementById('fDr').value) || 0;
  const cr = parseFloat(document.getElementById('fCr').value) || 0;
  const note = document.getElementById('fNote').value.trim();
  const msgEl = document.getElementById('formMsg');
  
  if (!dateVal) { msgEl.textContent = '請選擇日期'; return; }
  if (!desc) { msgEl.textContent = '請輸入摘要'; return; }
  if (dr === 0 && cr === 0) { msgEl.textContent = '請輸入 Dr. 或 Cr. 金額'; return; }
  
  msgEl.textContent = 'Saving...';
  
  // Build sheet name from selected date
  const sheetName = sheetNameFromDate(dateVal);
  
  const descFull = note ? `${desc}${note ? ' ('+note+')' : ''}` : desc;
  
  const url = `${API}?action=write&sheetName=${encodeURIComponent(sheetName)}&date=${encodeURIComponent(dateVal)}&time=${encodeURIComponent(new Date().toTimeString().slice(0,5))}&desc=${encodeURIComponent(descFull)}&dr=${dr}&cr=${cr}`;
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { msgEl.textContent = 'Error: ' + data.error; return; }
    msgEl.style.color = 'var(--cr)';
    msgEl.textContent = 'Saved!';
    // If new sheet, add to selector
    if (!allSheets.includes(sheetName)) {
      allSheets.push(sheetName);
      allSheets.sort((a,b) => {
        const [ma,ya] = a.split(/[月\s]+/);
        const [mb,yb] = b.split(/[月\s]+/);
        return (parseInt(ya||0)*12+parseInt(ma)) - (parseInt(yb||0)*12+parseInt(mb));
      });
      const sel = document.getElementById('sheetSelect');
      const opt = document.createElement('option');
      opt.value = sheetName; opt.textContent = sheetName;
      sel.appendChild(opt);
    }
    currentSheet = sheetName;
    document.getElementById('sheetSelect').value = sheetName;
    // Reload descriptions and data
    await loadDescriptions();
    setTimeout(() => {
      closeForm();
      switchSheet(sheetName);
    }, 800);
  } catch(e) {
    msgEl.style.color = 'var(--dr)';
    msgEl.textContent = 'Network error. Try again.';
  }
}

init();
</script>
</body>
</html>
